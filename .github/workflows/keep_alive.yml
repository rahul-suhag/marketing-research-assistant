name: Keep Alive

on:
  schedule:
    - cron: "0 6 * * *"    # 1:00 AM CT (Texas)
    - cron: "0 12 * * *"   # 7:00 AM CT (Texas)
    - cron: "0 18 * * *"   # 1:00 PM CT (Texas)
    - cron: "0 0 * * *"    # 7:00 PM CT (Texas)
  workflow_dispatch:         # manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" https://rahulsuhag-ai.streamlit.app)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: app returned HTTP $STATUS"
          fi
